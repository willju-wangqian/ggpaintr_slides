title: ISU revealjs
author: Reproduced from the official Iowa State University PowerPoint template
version: 1.0.0
quarto-required: ">=1.4.0"
contributes:
  formats:
    revealjs:
      theme: [default, isu.scss]
      width: 1000
      height: 750
      margin: 0
      slide-number: c
      footer: "Unit or Department Name Here"
      highlight-style: github
      menu: false
      chalkboard: false
      transition: none
